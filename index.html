<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="quiz-container">
    <h1>Quiz App</h1>
    <p class="subtitle">Test your general knowledge</p>

    <div id="welcome-box">
      <p>50 questions. 30 seconds each.<br>How well do you know the world?</p>
      <button id="play-btn">Play Now</button>
    </div>

    <div id="question-box" style="display:none;">
      <p id="progress-text">Question 1 of 50</p>
      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
      <p class="timer-label">Time left: <span id="timer-num">30</span>s</p>
      <p id="question-text">Question goes here</p>
      <div id="answer-buttons">
        <button class="answer-btn">Answer 1</button>
        <button class="answer-btn">Answer 2</button>
        <button class="answer-btn">Answer 3</button>
        <button class="answer-btn">Answer 4</button>
      </div>
    </div>

    <div id="result-box" style="display:none;">
      <h2>You scored <span id="score">0</span> out of 50!</h2>
      <p style="color:#aaa; font-size:14px; margin-top:8px;">
        High Score: <span id="high-score-display">0</span>
      </p>
      <p id="new-record" style="color:gold; font-size:13px; margin-top:4px; display:none;">
        New record!
      </p>
      <button id="restart-btn">Play Again</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
